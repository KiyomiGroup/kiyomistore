<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — WLK</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body style="min-height:100vh;background:#080807;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;font-family:'DM Sans',sans-serif;">

  <div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:#d4b870;margin-bottom:32px;letter-spacing:0.02em;">WLK.</div>
  <div style="font-size:52px;margin-bottom:24px;">🌿</div>
  <h2 style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;font-style:italic;color:#fff;line-height:1.1;margin-bottom:16px;">Order<br>Received.</h2>
  <p id="successMsg" style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.8;max-width:280px;margin-bottom:24px;">
    Thank you for your order. We'll be in touch shortly to confirm delivery.
  </p>
  <div id="successOrderId" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:14px 24px;font-size:12px;letter-spacing:0.1em;color:#b8973e;margin-bottom:8px;">Loading...</div>
  <p style="font-size:11px;color:rgba(255,255,255,0.2);margin-bottom:36px;">Keep this Order ID for your records</p>

  <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;">
    <a href="https://wa.me/447424985544" target="_blank"
      style="display:block;background:#25D366;color:#fff;text-align:center;padding:16px 24px;border-radius:4px;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;">
      💬 Chat with Us on WhatsApp
    </a>
    <a href="index.html"
      style="display:block;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);text-align:center;padding:16px 24px;border-radius:4px;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.08);">
      ← Back to Store
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const method = params.get('method');
    const orderId = params.get('order') || sessionStorage.getItem('wlk_last_order') || '—';
    document.getElementById('successOrderId').textContent = orderId;
    if (method === 'whatsapp') {
      document.getElementById('successMsg').textContent = 'Your order summary has been sent to WhatsApp. We\'ll confirm and arrange delivery soon.';
    } else if (method === 'paystack') {
      document.getElementById('successMsg').textContent = 'Payment confirmed! Our team will contact you on WhatsApp to arrange delivery.';
    }
  </script>
</body>
</html>
